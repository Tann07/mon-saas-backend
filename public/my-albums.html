<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
        (function() {
            const token = localStorage.getItem('monBadgePhoto');
            if (!token) {
                window.location.replace('/index.html');
            }
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Collections — Mon SaaS Photo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-boho: #FAF6F0;
            --primary-terracotta: #C97A63;
            --primary-hover: #B26550;
            --secondary-sage: #8DA191;
            --text-dark: #2D2A26;
            --text-light: #766E65;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition-fluid: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-boho); 
            color: var(--text-dark); 
            padding: 100px 20px 60px 20px; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        .search-bar-global { 
            width: 100%; padding: 14px 20px; border: 1px solid #E5DCD3; border-radius: var(--radius-md); 
            margin-bottom: 32px; font-size: 14px; background: white; outline: none;
            box-shadow: 0 4px 15px rgba(74, 58, 49, 0.02);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; }
        
        .btn { 
            background: var(--text-dark); color: white; padding: 12px 22px; border: none; 
            border-radius: var(--radius-sm); font-weight: 600; font-size: 13px; cursor: pointer; 
            display: inline-flex; align-items: center; gap: 6px; transition: var(--transition-fluid);
        }
        .btn-create { background: var(--primary-terracotta); }

        /* GRILLE MOBILE & DESKTOP */
        .albums-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; 
        }

        @media (max-width: 650px) {
            body { padding-top: 85px; padding-left: 14px; padding-right: 14px; }
            .albums-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 24px; }
        }
        
        /* 💡 OVERFLOW VISIBLE POUR NE PAS COUPER LE MENU */
        .album-card { 
            position: relative; background: white; border-radius: var(--radius-lg); 
            box-shadow: 0 10px 25px rgba(74, 58, 49, 0.04); cursor: grab; 
            transition: var(--transition-fluid); border: 1px solid rgba(240, 230, 220, 0.6);
            display: flex; flex-direction: column; justify-content: space-between; min-height: 280px;
            overflow: visible !important; /* Permet au menu de dépasser proprement */
            background-size: cover; background-position: center;
            user-select: none; z-index: 1;
        }
        .album-card:active { cursor: grabbing; }
        .album-card.dragging { opacity: 0.3; transform: scale(0.96); }

        .album-card-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.8) 100%); 
            border-radius: var(--radius-lg); 
            z-index: 1; 
        }
        .album-card.has-bg .album-title, .album-card.has-bg .album-desc, .album-card.has-bg .btn-open { color: white !important; text-shadow: 0 2px 4px rgba(0,0,0,0.6); }

        .album-card-content { position: relative; z-index: 2; padding: 24px; display: flex; flex-direction: column; height: 100%; justify-content: space-between; }

        /* MENU 3 PETITS POINTS */
        .dots-menu-btn {
            position: absolute; top: 16px; right: 16px; z-index: 10;
            background: rgba(255, 255, 255, 0.95); border: none; border-radius: 50%; width: 36px; height: 36px;
            font-size: 18px; cursor: pointer; color: var(--text-dark); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12); transition: var(--transition-fluid);
        }
        .dots-menu-btn:hover { transform: scale(1.08); background: white; }

        /* 💡 Z-INDEX ÉLEVÉ POUR LE MENU DÉROULANT */
        .dropdown-menu {
            display: none; position: absolute; top: 58px; right: 16px; z-index: 9999;
            background: white; border-radius: var(--radius-sm); box-shadow: 0 12px 35px rgba(0,0,0,0.22);
            border: 1px solid rgba(0,0,0,0.1); min-width: 220px; overflow: hidden;
        }
        .dropdown-menu button {
            width: 100%; text-align: left; padding: 12px 16px; border: none; background: transparent;
            font-size: 12.5px; font-weight: 600; color: var(--text-dark); cursor: pointer; border-bottom: 1px solid #FAF6F0;
            display: flex; align-items: center; gap: 8px;
        }
        .dropdown-menu button:last-child { border-bottom: none; }
        .dropdown-menu button:hover { background: var(--bg-boho); color: var(--primary-terracotta); }

        .badge-status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; margin-bottom: 10px; width: fit-content; }
        .album-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 4px; }
        .photo-counter { font-size: 12px; font-weight: 600; margin-bottom: 8px; opacity: 0.85; }
        .album-desc { font-size: 12px; line-height: 1.4; opacity: 0.85; margin-bottom: 14px; }
        .btn-open { text-align: center; font-size: 12px; font-weight: 700; color: var(--primary-terracotta); margin-top: auto; }
    </style>
</head>

<script src="/navbar.js"></script>

<body>

<div class="container">
    <input type="text" id="globalAlbumSearch" class="search-bar-global" placeholder="Rechercher un album par son nom...">

    <div class="header">
        <h1>Mes Collections</h1>
        <button class="btn btn-create" id="toggleFormBtn">✨ Créer un Album</button>
    </div>

    <input type="file" id="bgFileInput" accept="image/*" style="display: none;">

    <div class="albums-grid" id="albumsGrid"></div>
</div>

<script>
    const token = localStorage.getItem('monBadgePhoto');
    if (!token) window.location.replace('/index.html');

    let listeCompleteAlbums = [];
    let albumTargetForBg = null;
    let draggedCard = null;
    const bgFileInput = document.getElementById('bgFileInput');

    window.addEventListener('DOMContentLoaded', async () => {
        await chargerMesAlbums();
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.album-card').forEach(c => c.style.zIndex = '1');
        });
    });

    async function chargerMesAlbums() {
        try {
            const response = await fetch('/api/albums/my-albums', { headers: { 'Authorization': `Bearer ${token}` } });
            const tousLesAlbums = await response.json();
            listeCompleteAlbums = tousLesAlbums.filter(album => !album.parentAlbum);
            await afficherAlbumsBruts(listeCompleteAlbums);
        } catch (error) { console.error(error); }
    }

    async function afficherAlbumsBruts(albums) {
        const grid = document.getElementById('albumsGrid');
        grid.innerHTML = '';

        for (const album of albums) {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.draggable = true;
            card.id = `album-${album._id}`;
            
            const estPublic = album.statut === "public";
            let bgImage = album.photoCouverture || "";
            let countPhotos = 0;

            try {
                const resP = await fetch(`/api/photos/album/${album._id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const photos = await resP.json();
                countPhotos = photos.length || 0;
                if (!bgImage && countPhotos > 0) {
                    bgImage = photos[0].urlImage; 
                }
            } catch(e) {}

            if (bgImage) {
                card.style.backgroundImage = `url('${bgImage}')`;
                card.classList.add('has-bg');
            }

            card.innerHTML = `
                ${bgImage ? '<div class="album-card-overlay"></div>' : ''}
                <button class="dots-menu-btn">⋮</button>
                
                <div class="dropdown-menu">
                    <button class="btn-change-bg">📸 Modifier le fond (PC)</button>
                    <button class="btn-toggle-share">${estPublic ? "🔒 Rendre Privé" : "🌐 Rendre Public"}</button>
                    <button class="btn-zip">📥 Télécharger ZIP</button>
                    <button class="btn-invite">👥 Inviter collaborateur</button>
                    ${estPublic ? `
                        <button class="btn-copy-link">🔗 Copier le lien</button>
                        <button class="btn-qr">📱 QR Code</button>
                        <button class="btn-pin">${album.codePIN ? "🔒 Modifier/Enlever PIN" : "🔑 Créer PIN"}</button>
                    ` : ''}
                    <button class="btn-delete" style="color:#C96363;">🗑️ Supprimer</button>
                </div>

                <div class="album-card-content">
                    <div>
                        <div class="badge-status" style="background: ${estPublic ? 'rgba(141, 161, 145, 0.35)' : 'rgba(201, 122, 99, 0.35)'}; color: ${estPublic ? 'var(--secondary-sage)' : 'var(--primary-terracotta)'};">
                            ${estPublic ? "🌐 Public" : "🔒 Privé"}
                        </div>
                        <h3 class="album-title">${album.titre}</h3>
                        <div class="photo-counter">📸 ${countPhotos} photo${countPhotos > 1 ? 's' : ''}</div>
                        <p class="album-desc">${album.description || 'Aucun récit renseigné.'}</p>
                    </div>
                    <div class="btn-open">Parcourir la galerie ➔</div>
                </div>
            `;
            
            grid.appendChild(card);

            // Redirection
            card.addEventListener('click', (e) => {
                if (e.target.closest('.dots-menu-btn') || e.target.closest('.dropdown-menu')) return;
                localStorage.setItem('currentAlbumId', album._id);
                window.location.href = `/gallery.html?id=${album._id}`; 
            });

            // GESTION DU MENU DÉROULANT ET DES Z-INDEX
            const dotsBtn = card.querySelector('.dots-menu-btn');
            const menu = card.querySelector('.dropdown-menu');

            dotsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.dropdown-menu').forEach(m => { 
                    if(m !== menu) {
                        m.style.display = 'none';
                        m.closest('.album-card').style.zIndex = '1';
                    }
                });

                const isOpen = (menu.style.display === 'block');
                menu.style.display = isOpen ? 'none' : 'block';
                card.style.zIndex = isOpen ? '1' : '500'; // Passe la carte au premier plan
            });

            // Action : Modifier Fond
            card.querySelector('.btn-change-bg').addEventListener('click', (e) => {
                e.stopPropagation(); menu.style.display = 'none'; card.style.zIndex = '1';
                albumTargetForBg = album._id;
                bgFileInput.click();
            });

            // Action : Privé / Public
            card.querySelector('.btn-toggle-share').addEventListener('click', async (e) => {
                e.stopPropagation();
                await fetch(`/api/albums/${album._id}/toggle-share`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } });
                window.location.reload();
            });

            // Action : ZIP
            card.querySelector('.btn-zip').addEventListener('click', async (e) => {
                e.stopPropagation();
                const resPhotos = await fetch(`/api/photos/album/${album._id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const photos = await resPhotos.json();
                if(photos.length === 0) return alert("⚠️ Album vide.");
                const zip = new JSZip();
                for (let i = 0; i < photos.length; i++) {
                    const response = await fetch(photos[i].urlImage);
                    const blob = await response.blob();
                    zip.file(`photo_${i+1}.jpg`, blob);
                }
                const content = await zip.generateAsync({ type: "blob" });
                const urlZip = window.URL.createObjectURL(content);
                const a = document.createElement('a'); a.href = urlZip; a.download = `${album.titre}_archive.zip`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            });

            // Action : Inviter
            card.querySelector('.btn-invite').addEventListener('click', async (e) => {
                e.stopPropagation();
                const email = prompt("Email du collaborateur :");
                if(!email) return;
                const res = await fetch(`/api/albums/${album._id}/invite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ emailInvite: email })
                });
                const data = await res.json(); alert(data.message);
            });

            if (estPublic) {
                const lienPublic = `${window.location.origin}/view-share.html?code=${album.codePartage}`;
                
                card.querySelector('.btn-copy-link').addEventListener('click', (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(lienPublic);
                    alert("📋 Lien d'accès copié dans votre presse-papiers !");
                });

                card.querySelector('.btn-qr').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(lienPublic)}`;
                    const w = window.open("", "_blank", "width=320,height=380");
                    w.document.write(`<div style="text-align:center;padding:24px;font-family:sans-serif;background:#FAF6F0;height:100vh;box-sizing:border-box;"><h4 style="color:#2D2A26;margin-bottom:16px;">Scanner le QR Code</h4><img src="${qrUrl}" style="max-width:180px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.05);"><br><button onclick="window.close()" style="margin-top:24px;padding:8px 16px;background:#2D2A26;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;">Fermer</button></div>`);
                });

                card.querySelector('.btn-pin').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const promptMsg = album.codePIN 
                        ? `PIN actuel : ${album.codePIN}\nEntrez le nouveau PIN (ou Laissez VIDE pour supprimer) :`
                        : `Définir un code PIN à 4 chiffres (ex: 1234) :`;

                    const pin = prompt(promptMsg, album.codePIN || "");
                    if (pin === null) return;

                    await fetch(`/api/albums/${album._id}/set-pin`, { 
                        method: 'PUT', 
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                        body: JSON.stringify({ pin: pin.trim() }) 
                    });
                    
                    window.location.reload();
                });
            }

            // Action : Supprimer
            card.querySelector('.btn-delete').addEventListener('click', async (e) => {
                e.stopPropagation();
                if(confirm("Supprimer définitivement cet album ?")) {
                    await fetch(`/api/albums/${album._id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                    window.location.reload();
                }
            });

            // Drag & drop
            card.addEventListener('dragstart', () => { draggedCard = card; card.classList.add('dragging'); });
            card.addEventListener('dragend', () => { card.classList.remove('dragging'); draggedCard = null; });
            card.addEventListener('dragover', (e) => e.preventDefault());
            card.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedCard && draggedCard !== card) {
                    const allCards = Array.from(grid.children);
                    const draggedIndex = allCards.indexOf(draggedCard);
                    const targetIndex = allCards.indexOf(card);
                    if (draggedIndex < targetIndex) grid.insertBefore(draggedCard, card.nextSibling);
                    else grid.insertBefore(draggedCard, card);
                }
            });
        }
    }

    bgFileInput.addEventListener('change', async (e) => {
        if (!e.target.files || e.target.files.length === 0 || !albumTargetForBg) return;
        const formData = new FormData();
        formData.append('image', e.target.files[0]);

        try {
            const res = await fetch(`/api/albums/${albumTargetForBg}/cover-upload`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (res.ok) window.location.reload();
        } catch(err) { alert("Erreur réseau."); }
    });
</script>
</body>
</html>
