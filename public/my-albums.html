<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Collections — Mon SaaS Photo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 🎨 DESIGN SYSTEM BOHO-TECH */
        :root {
            --bg-boho: #FAF6F0;           /* Fond crème organique */
            --primary-terracotta: #C97A63;  /* Ocre signature */
            --primary-hover: #B26550;
            --secondary-sage: #8DA191;     /* Vert sauge / Drive */
            --text-dark: #2D2A26;          /* Charbon doux */
            --text-light: #766E65;         /* Teinte sable secondaire */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition-fluid: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ✨ STRUCTURATION */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-boho); 
            color: var(--text-dark); 
            padding: 120px 24px 60px 24px; 
            min-height: 100vh;
        }

        /* 🧭 NAV BAR GLASSMORPHISM */
        .navbar { 
            position: fixed; top: 0; left: 0; right: 0; height: 75px; 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px; 
            border-bottom: 1px solid rgba(201, 122, 99, 0.06); z-index: 1000; 
        }
        .navbar-brand { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
        .nav-links a { 
            color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 14px; 
            margin-left: 24px; transition: var(--transition-fluid);
        }
        .nav-links a:hover { color: var(--primary-terracotta); }
        .nav-links a.active { color: var(--primary-terracotta); }

        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 🔍 BARRE DE RECHERCHE CONTEXTUELLE */
        .search-bar-global { 
            width: 100%; padding: 16px 24px; border: 1px solid #E5DCD3; border-radius: var(--radius-md); 
            margin-bottom: 40px; font-size: 15px; background: white; outline: none;
            transition: var(--transition-fluid); box-shadow: 0 8px 24px rgba(74, 58, 49, 0.02);
        }
        .search-bar-global:focus { 
            border-color: var(--primary-terracotta); 
            box-shadow: 0 12px 30px rgba(201, 122, 99, 0.08);
        }
        
        /* 👑 ENTÊTE DE SECTION */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; }
        
        /* BOUTONS STYLE BOHO CHIC */
        .btn { 
            background: var(--text-dark); color: white; padding: 12px 24px; border: none; 
            border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; cursor: pointer; 
            transition: var(--transition-fluid); display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { background: #44403A; transform: translateY(-1px); }
        .btn-create { background: var(--primary-terracotta); }
        .btn-create:hover { background: var(--primary-hover); }
        
        /* 🖼️ GRILLE ET CARTES D'ALBUMS EXTENSIBLES */
        .albums-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; 
        }
        
        .album-card { 
            position: relative; background: white; padding: 32px; border-radius: var(--radius-lg); 
            box-shadow: 0 10px 30px rgba(74, 58, 49, 0.02); cursor: pointer; 
            transition: var(--transition-fluid); border: 1px solid rgba(240, 230, 220, 0.6);
            display: flex; flex-direction: column; justify-content: space-between; min-height: 280px;
        }
        .album-card:hover { 
            transform: translateY(-4px); box-shadow: 0 20px 40px rgba(74, 58, 49, 0.08); 
            border-color: rgba(201, 122, 99, 0.15);
        }
        
        /* Bouton de suppression discret au survol */
        .btn-delete-album { 
            position: absolute; top: 24px; right: 24px; background: rgba(201, 99, 99, 0.06); 
            color: #C96363; border: none; border-radius: 50%; width: 28px; height: 28px; 
            cursor: pointer; font-weight: bold; z-index: 10; font-size: 11px;
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition-fluid);
        }
        .album-card:hover .btn-delete-album { opacity: 1; }
        .btn-delete-album:hover { background: #C96363; color: white; }
        
        /* Badges de Visibilité */
        .badge-status {
            position: absolute; top: 24px; left: 32px; padding: 4px 12px; 
            border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
        }

        .photo-counter { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
        .album-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
        .album-desc { color: var(--text-light); font-size: 13px; line-height: 1.5; margin-bottom: 24px; flex-grow: 1; }

        /* ACTIONS EN BLOC COMPACT */
        .actions-group { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #FAF6F0; padding-top: 18px; }
        .actions-row { display: flex; gap: 6px; width: 100%; }
        
        .btn-action-share { 
            border: none; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 11px; 
            cursor: pointer; font-weight: 600; transition: var(--transition-fluid);
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        }
        
        /* Variations de boutons utilitaires */
        .toggle-btn { background: #FCFAF7; color: var(--text-dark); border: 1px solid #E5DCD3; }
        .toggle-btn:hover { background: #FAF6F0; }
        .btn-download-zip { background: rgba(201, 122, 99, 0.08); color: var(--primary-terracotta); }
        .btn-download-zip:hover { background: var(--primary-terracotta); color: white; }
        .btn-invite { background: #2D2A26; color: white; }
        .btn-invite:hover { background: #44403A; }
        
        .copy-btn { background: rgba(141, 161, 145, 0.1); color: var(--secondary-sage); }
        .copy-btn:hover { background: var(--secondary-sage); color: white; }
        .qr-btn { background: #F3EAF5; color: #9C27B0; }
        .pin-btn { background: #FFF4E5; color: #E65100; }

        .btn-open { 
            text-align: center; font-size: 12px; font-weight: 600; color: var(--text-light);
            margin-top: 14px; transition: var(--transition-fluid); letter-spacing: 0.3px;
        }
        .album-card:hover .btn-open { color: var(--primary-terracotta); }

        /* 🏠 PANNEAU FORMULAIRE DÉROULANT */
        .form-container { 
            display: none; background: white; padding: 32px; border-radius: var(--radius-lg); 
            box-shadow: 0 15px 35px rgba(74, 58, 49, 0.04); margin-bottom: 40px; 
            border: 1px solid rgba(240, 230, 220, 0.8); animation: fadeIn 0.4s ease;
        }
        .form-container h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 18px; }
        
        input[type="text"], textarea { 
            width: 100%; padding: 12px 18px; margin: 8px 0 16px 0; border: 1px solid #E5DCD3; 
            border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; background: #FCFAF7; outline: none;
            transition: var(--transition-fluid);
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary-terracotta); background: white; }
        textarea { height: 80px; resize: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🌾 Mon SaaS Photo</div>
    <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/my-albums.html" class="active">Mes Albums</a>
        <a href="/editor.html" style="color: #8A65B2;">Studio Retouche</a>
    </div>
</nav>

<div class="container">
    <input type="text" id="globalAlbumSearch" class="search-bar-global" placeholder="Rechercher un album par son nom...">

    <div class="header">
        <h1>Mes Collections</h1>
        <button class="btn btn-create" id="toggleFormBtn">✨ Créer un Album</button>
    </div>

    <div class="form-container" id="albumFormContainer">
        <h3>Nouveau dossier d'album</h3>
        <form id="createAlbumForm">
            <input type="text" id="albumTitre" placeholder="Donnez un nom mémorable à cet album..." required>
            <textarea id="albumDescription" placeholder="Une courte histoire ou note contextuelle (optionnelle)..."></textarea>
            <button type="submit" class="btn" style="background: var(--secondary-sage);">Enregistrer la collection</button>
        </form>
    </div>

    <div class="albums-grid" id="albumsGrid"></div>
</div>

<script>
    // --- CONSERVATION DE LA LOGIQUE SECURE ET ROUTAGE ---
    const token = localStorage.getItem('monBadgePhoto');
    if (!token) window.location.replace('/index.html');

    let listeCompleteAlbums = [];

    const toggleFormBtn = document.getElementById('toggleFormBtn');
    const albumFormContainer = document.getElementById('albumFormContainer');
    toggleFormBtn.addEventListener('click', () => { 
        albumFormContainer.style.display = albumFormContainer.style.display === 'block' ? 'none' : 'block'; 
    });

    // Moteur de recherche local instantané
    document.getElementById('globalAlbumSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtres = listeCompleteAlbums.filter(a => a.titre.toLowerCase().includes(query));
        afficherAlbumsBruts(filtres);
    });

    window.addEventListener('DOMContentLoaded', async () => {
        await chargerMesAlbums();
        await chargerAlbumsPartages();
    });

    async function chargerMesAlbums() {
        try {
            const response = await fetch('/api/albums/my-albums', { headers: { 'Authorization': `Bearer ${token}` } });
            listeCompleteAlbums = await response.json();
            afficherAlbumsBruts(listeCompleteAlbums);
        } catch (error) { console.error(error); }
    }

    // GÉNÉRATEUR DE CARTES D'ALBUMS (COMPATIBLE AVEC TOUTES TES FONCTIONS CLICS)
    function afficherAlbumsBruts(albums) {
        const grid = document.getElementById('albumsGrid');
        grid.innerHTML = '';
        if (albums.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-light); font-style: italic;'>Aucune collection trouvée.</p>";
            return;
        }
        
        albums.forEach(async (album) => {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.id = `album-${album._id}`;
            
            const estPublic = album.statut === "public";
            const badgeColor = estPublic ? "rgba(141, 161, 145, 0.15)" : "rgba(201, 122, 99, 0.15)";
            const textColor = estPublic ? "var(--secondary-sage)" : "var(--primary-terracotta)";
            const badgeTexte = estPublic ? "🌐 Public" : "🔒 Privé";

            card.innerHTML = `
                <button class="btn-delete-album" title="Supprimer la collection">✕</button>
                
                <div class="badge-status" style="background: ${badgeColor}; color: ${textColor};">
                    ${badgeTexte}
                </div>
                
                <div>
                    <h3 class="album-title">${album.titre}</h3>
                    <div class="photo-counter" style="color: ${textColor};">
                        📸 Analyse du contenu...
                    </div>
                    <p class="album-desc">${album.description || 'Aucun récit renseigné pour cette collection.'}</p>
                </div>
                
                <div class="actions-group">
                    <div class="actions-row">
                        <button class="btn-action-share toggle-btn" style="flex: 2;">
                            ${estPublic ? "Rendre Privé" : "Rendre Public"}
                        </button>
                        <button class="btn-action-share btn-download-zip" title="Télécharger l'archive complète">📥 ZIP</button>
                        <button class="btn-action-share btn-invite" title="Inviter des collaborateurs">👥 Espace</button>
                    </div>
                    
                    ${estPublic ? `
                    <div class="actions-row" style="animation: fadeIn 0.3s ease;">
                        <button class="btn-action-share copy-btn" style="flex: 1;">🔗 Copier</button>
                        <button class="btn-action-share qr-btn">📱 QR</button>
                        <button class="btn-action-share pin-btn">${album.codePIN ? "🔒 Éditer PIN" : "🔑 Créer PIN"}</button>
                    </div>
                    ` : ''}
                    
                    <div class="btn-open">Parcourir la galerie →</div>
                </div>
            `;
            
            grid.appendChild(card);

            // Redirection globale vers la galerie au clic sur la carte
            card.addEventListener('click', () => {
                localStorage.setItem('currentAlbumId', album._id);
                window.location.href = '/gallery.html'; 
            });

            // --- PROTECTIONS ET ACTIONS DES BOUTONS IMBRIQUÉS (stopPropagation) ---
            card.querySelector('.btn-delete-album').addEventListener('click', async (e) => {
                e.stopPropagation();
                if(confirm("Supprimer définitivement cet album ainsi que toutes ses données ?")) {
                    await fetch(`/api/albums/${album._id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                    window.location.reload();
                }
            });

            card.querySelector('.toggle-btn').addEventListener('click', async (e) => {
                e.stopPropagation();
                await fetch(`/api/albums/${album._id}/toggle-share`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } });
                window.location.reload();
            });

            // Logique ZIP asynchrone sécurisée
            card.querySelector('.btn-download-zip').addEventListener('click', async (e) => {
                e.stopPropagation();
                const btn = e.target; const txt = btn.innerText; btn.innerText = "⏳"; btn.disabled = true;
                try {
                    const resPhotos = await fetch(`/api/photos/album/${album._id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const photos = await resPhotos.json();
                    if(photos.length === 0) { alert("⚠️ Cet album ne contient aucun fichier."); btn.innerText = txt; btn.disabled = false; return; }
                    
                    const zip = new JSZip();
                    for (let i = 0; i < photos.length; i++) {
                        const response = await fetch(photos[i].urlImage);
                        const blob = await response.blob();
                        zip.file(photos[i].titre ? `${photos[i].titre}.jpg` : `photo_${i+1}.jpg`, blob);
                    }
                    const content = await zip.generateAsync({ type: "blob" });
                    const urlZip = window.URL.createObjectURL(content);
                    const a = document.createElement('a'); a.href = urlZip; a.download = `${album.titre.replace(/\s+/g, '_')}_archive.zip`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } catch (error) { alert("Erreur d'écriture de l'archive compressée."); }
                btn.innerText = txt; btn.disabled = false;
            });

            // Ajout de membres collaboratifs (Espace Drive)
            card.querySelector('.btn-invite').addEventListener('click', async (e) => {
                e.stopPropagation();
                const email = prompt("Saisissez l'adresse e-mail de votre collaborateur :");
                if(!email) return;
                const res = await fetch(`/api/albums/${album._id}/invite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ emailInvite: email })
                });
                const data = await res.json();
                alert(data.message);
            });

            // Actions conditionnelles liées au statut Public
            if (estPublic) {
                const lienPublic = `${window.location.origin}/view-share.html?code=${album.codePartage}`;
                card.querySelector('.copy-btn').addEventListener('click', (e) => { 
                    e.stopPropagation(); navigator.clipboard.writeText(lienPublic); alert("📋 Lien d'accès copié dans votre presse-papiers !"); 
                });
                card.querySelector('.qr-btn').addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(lienPublic)}`; 
                    const w = window.open("", "_blank", "width=320,height=380"); 
                    w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:32px;background:#FAF6F0;height:100vh;box-sizing:border-box;"><h4 style="color:#2D2A26;margin-bottom:16px;">Scanner le QR Code</h4><img src="${qrUrl}" style="max-width:180px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.05);"><br><button onclick="window.close()" style="margin-top:24px;padding:8px 16px;background:#2D2A26;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;">Fermer</button></div>`); 
                });
                card.querySelector('.pin-btn').addEventListener('click', async (e) => { 
                    e.stopPropagation(); 
                    const nvoPIN = prompt("Définir un code de verrouillage à 4 chiffres :", album.codePIN || ""); 
                    if (nvoPIN === null) return; 
                    await fetch(`/api/albums/${album._id}/set-pin`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ pin: nvoPIN }) }); 
                    window.location.reload(); 
                });
            }

            // Chargement fluide et différé du compteur de fichiers
            try {
                const resPhotosCount = await fetch(`/api/photos/album/${album._id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (resPhotosCount.ok) {
                    const photosCount = await resPhotosCount.json();
                    const nb = photosCount.length || 0;
                    card.querySelector('.photo-counter').innerText = `✨ ${nb} cliché${nb > 1 ? 's' : ''} indexé${nb > 1 ? 's' : ''}`;
                }
            } catch (err) { card.querySelector('.photo-counter').innerText = `✨ 0 cliché`; }
        });
    }

    // INTERFACE DRIVE COLLABORATIVE (ALBUMS REÇUS)
    async function chargerAlbumsPartages() {
        const container = document.querySelector('.container');
        const blockPartage = document.createElement('div');
        blockPartage.innerHTML = `
            <h1 style="margin-top:60px; border-top:1px solid #E5DCD3; padding-top:40px; font-family: 'Playfair Display', serif; font-size:28px; margin-bottom:24px;">
                📥 Epaules partagées (Espaces invités)
            </h1>
            <div class="albums-grid" id="sharedAlbumsGrid"></div>
        `;
        container.appendChild(blockPartage);
        const sharedGrid = document.getElementById('sharedAlbumsGrid');

        try {
            const response = await fetch('/api/albums/shared-with-me', { headers: { 'Authorization': `Bearer ${token}` } });
            const albumsShared = await response.json();
            if (albumsShared.length === 0) {
                sharedGrid.innerHTML = "<p style='grid-column: 1/-1; color: var(--text-light); font-style:italic;'>Aucun espace partagé n'a été rattaché à votre compte pour le moment.</p>";
                return;
            }
            albumsShared.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <div class="badge-status" style="background: rgba(141, 161, 145, 0.15); color: var(--secondary-sage);">
                        📥 Propriétaire : ${album.createur.email.split('@')[0]}
                    </div>
                    <h3 class="album-title">${album.titre}</h3>
                    <p class="album-desc">${album.description || 'Espace collaboratif sans note descriptive.'}</p>
                    <div class="btn-open" style="margin-top:auto;">Rejoindre le dossier partagé →</div>
                `;
                card.addEventListener('click', () => {
                    localStorage.setItem('currentAlbumId', album._id);
                    window.location.href = '/gallery.html'; 
                });
                sharedGrid.appendChild(card);
            });
        } catch (error) { console.error(error); }
    }

    // FORMULAIRE DE CRÉATION DE DOSSIER
    document.getElementById('createAlbumForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const titre = document.getElementById('albumTitre').value;
        const description = document.getElementById('albumDescription').value;
        try {
            const response = await fetch('/api/albums/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ titre, description })
            });
            if (response.ok) window.location.reload();
        } catch (error) { console.error(error); }
    });
</script>
</body>
</html>
