<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Partagé — Galerie Photo & Vidéo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 🎨 DESIGN SYSTEM BOHO-TECH */
        :root {
            --bg-boho: #FAF6F0;           /* Crème lin doux */
            --primary-terracotta: #C97A63;  /* Ocre signature */
            --primary-hover: #B26550;
            --secondary-sage: #8DA191;     /* Vert sauge */
            --text-dark: #2D2A26;          /* Charbon minéral */
            --text-light: #766E65;         /* Sable chaud */
            --glass-bg: rgba(255, 255, 255, 0.85);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --transition-fluid: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-boho); 
            color: var(--text-dark); 
            margin: 0; 
            padding-top: 105px; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 🧭 BANDEAU DE NAVIGATION PUBLIC */
        .navbar-public { 
            position: fixed; top: 0; left: 0; right: 0; height: 75px; 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; border-bottom: 1px solid rgba(201, 122, 99, 0.08); z-index: 1000; 
            box-sizing: border-box;
        }
        .album-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 20px; 
            font-weight: 600; 
            color: var(--text-dark); 
        }
        
        .btn-download-all { 
            background: var(--primary-terracotta); color: white; border: none; 
            padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 600; 
            font-size: 13px; cursor: pointer; transition: var(--transition-fluid);
            box-shadow: 0 8px 20px rgba(201, 122, 99, 0.15);
        }
        .btn-download-all:hover { 
            background: var(--primary-hover); transform: translateY(-1px);
            box-shadow: 0 12px 25px rgba(201, 122, 99, 0.25);
        }
        .btn-download-all:disabled { 
            background: #E5DCD3; color: var(--text-light); cursor: not-allowed; box-shadow: none;
        }

        .container { max-width: 1240px; margin: 0 auto; padding: 20px 40px; }
        
        /* 🖼️ GRILLE PHOTO & VIDÉO */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 24px; 
        }
        
        .media-card { 
            border-radius: var(--radius-md); overflow: hidden; background: white; 
            aspect-ratio: 1 / 1; cursor: pointer; position: relative; 
            box-shadow: 0 10px 25px rgba(74, 58, 49, 0.03); transition: var(--transition-fluid);
            border: 1px solid rgba(240, 230, 220, 0.6);
        }
        .media-card img, .media-card video { 
            width: 100%; height: 100%; object-fit: cover; display: block; transition: var(--transition-fluid); 
        }
        .media-card video { background: #000; }
        
        .badge-video {
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px); color: white; padding: 4px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            z-index: 2;
        }

        .play-overlay {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.25); color: white; font-size: 32px; transition: var(--transition-fluid);
            z-index: 1;
        }
        .media-card:hover .play-overlay { background: rgba(0,0,0,0.1); transform: scale(1.1); }

        .media-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(74, 58, 49, 0.08);
        }
        .media-card:hover img { transform: scale(1.05); }

        /* 🎞️ LIGHTBOX MIXTE (PHOTO & VIDÉO) */
        .lightbox { 
            display: none; position: fixed; inset: 0; 
            background: rgba(35, 32, 28, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 2000; justify-content: center; align-items: center; user-select: none; 
            animation: fadeIn 0.3s ease;
        }
        .lightbox-media { 
            max-width: 85%; max-height: 75vh; object-fit: contain; 
            border-radius: var(--radius-sm); box-shadow: 0 30px 70px rgba(0,0,0,0.5);
        }
        
        .lightbox-nav { 
            position: absolute; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15);
            color: white; font-size: 18px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; transition: var(--transition-fluid); z-index: 2100;
        }
        .lightbox-nav:hover { background: white; color: var(--text-dark); transform: scale(1.05); }
        
        #closeLb {
            position: absolute; top: 24px; right: 24px; background: rgba(255,255,255,0.1); 
            border: none; color: white; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: var(--transition-fluid); z-index: 2100;
        }
        #closeLb:hover { background: #C96363; transform: rotate(90deg); }
        
        .btn-dl-single { 
            position: absolute; bottom: 30px; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(8px);
            color: var(--text-dark); border: none; padding: 12px 26px; border-radius: 30px; 
            font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13px; 
            transition: var(--transition-fluid); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: inline-flex; align-items: center; gap: 8px; z-index: 2100;
        }
        .btn-dl-single:hover { background: white; transform: scale(1.03) translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav class="navbar-public">
    <div class="album-title" id="txtAlbumTitle">🌾 Chargement de la collection...</div>
    <button id="btnDlAllPublic" class="btn-download-all" disabled>📥 Tout télécharger (.ZIP)</button>
</nav>

<div class="container">
    <div class="gallery-grid" id="publicGrid"></div>
</div>

<div class="lightbox" id="publicLightbox">
    <button id="closeLb">✕</button>
    <button class="lightbox-nav" id="prevLb" style="left: 30px;">❮</button>
    
    <div id="lightboxMediaContainer" style="display:flex; justify-content:center; align-items:center; width:100%; height:100%;"></div>
    
    <button class="lightbox-nav" id="nextLb" style="right: 30px;">❯</button>
    
    <button id="btnDlSinglePublic" class="btn-dl-single">📥 Enregistrer ce fichier</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const codePartage = urlParams.get('code') || urlParams.get('token');

    const grid = document.getElementById('publicGrid');
    const lightbox = document.getElementById('publicLightbox');
    const mediaContainer = document.getElementById('lightboxMediaContainer');

    let listeMedias = [];
    let indexActuel = 0;
    let nomAlbum = "Album";

    window.addEventListener('DOMContentLoaded', async () => {
        if (!codePartage) {
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--text-light); font-style:italic;'>❌ Lien de partage incomplet ou introuvable.</p>";
            return;
        }

        try {
            // Tente la route spécifique aux albums partagés
            let response = await fetch(`/api/albums/shared/${codePartage}`);
            if (!response.ok) {
                // Secours vers la route auth publique alternative
                response = await fetch(`/api/auth/public-album/${codePartage}`);
            }

            const data = await response.json(); 

            if (!response.ok) {
                grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--text-light); font-style:italic;'>❌ Lien de partage expiré ou invalide.</p>";
                return;
            }
            
            nomAlbum = data.album ? data.album.titre : "Collection Privée";
            document.getElementById('txtAlbumTitle').innerText = `${nomAlbum}`;
            listeMedias = data.photos || [];

            afficherMediasPublic(listeMedias);
            configurerTelechargementZip();

        } catch (error) {
            console.error(error);
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--text-light);'>❌ Connexion au serveur impossible.</p>";
        }
    });

    function afficherMediasPublic(medias) {
        grid.innerHTML = '';
        if (medias.length === 0) {
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--text-light); font-style:italic;'>Cette collection ne contient aucun média actuellement.</p>";
            return;
        }

        medias.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'media-card';

            const estVideo = item.typeMedia === 'video' || (item.urlImage && (item.urlImage.endsWith('.mp4') || item.urlImage.endsWith('.mov')));

            if (estVideo) {
                card.innerHTML = `
                    <video src="${item.urlImage}#t=0.5" preload="metadata" muted playsinline></video>
                    <div class="badge-video">🎬 Vidéo</div>
                    <div class="play-overlay">▶</div>
                `;
            } else {
                card.innerHTML = `<img src="${item.urlImage}" alt="Photo">`;
            }

            card.addEventListener('click', () => ouvrirDiaporama(idx));
            grid.appendChild(card);
        });
        
        document.getElementById('btnDlAllPublic').disabled = false;
    }

    function ouvrirDiaporama(index) {
        indexActuel = index;
        const currentItem = listeMedias[indexActuel];
        const estVideo = currentItem.typeMedia === 'video' || (currentItem.urlImage && (currentItem.urlImage.endsWith('.mp4') || currentItem.urlImage.endsWith('.mov')));

        mediaContainer.innerHTML = '';

        if (estVideo) {
            const vid = document.createElement('video');
            vid.controls = true;
            vid.autoplay = true;
            vid.playsInline = true;
            vid.className = 'lightbox-media';
            
            // Multi-sources pour forcer la compatibilité Chrome/Safari/iOS
            vid.innerHTML = `
                <source src="${currentItem.urlImage}" type="video/mp4">
                <source src="${currentItem.urlImage}" type="video/quicktime">
                Votre navigateur ne prend pas en charge la lecture de cette vidéo.
            `;
            mediaContainer.appendChild(vid);
        } else {
            const img = document.createElement('img');
            img.src = currentItem.urlImage;
            img.className = 'lightbox-media';
            mediaContainer.appendChild(img);
        }

        lightbox.style.display = 'flex';

        document.getElementById('btnDlSinglePublic').onclick = async () => {
            const btn = document.getElementById('btnDlSinglePublic');
            btn.innerText = "⏳ Téléchargement...";

            try {
                const response = await fetch(currentItem.urlImage);
                const blob = await response.blob();
                const ext = estVideo ? 'mp4' : 'jpg';

                const urlBlob = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = urlBlob;
                a.download = `Media_${indexActuel + 1}.${ext}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(urlBlob);
            } catch (err) {
                alert("Erreur lors du téléchargement.");
            }
            btn.innerText = "📥 Enregistrer ce fichier";
        };
    }

    function naviguer(direction) {
        if (listeMedias.length === 0) return;
        indexActuel += direction;
        if (indexActuel >= listeMedias.length) indexActuel = 0;
        if (indexActuel < 0) indexActuel = listeMedias.length - 1;
        
        ouvrirDiaporama(indexActuel);
    }

    function configurerTelechargementZip() {
        document.getElementById('btnDlAllPublic').onclick = async () => {
            if (listeMedias.length === 0) return;
            const btn = document.getElementById('btnDlAllPublic');
            btn.innerText = "⏳ Traitement de l'archive...";
            btn.disabled = true;

            const zip = new JSZip();
            for (let i = 0; i < listeMedias.length; i++) {
                try {
                    const item = listeMedias[i];
                    const response = await fetch(item.urlImage);
                    const blob = await response.blob();
                    const estVideo = item.typeMedia === 'video' || (item.urlImage && (item.urlImage.endsWith('.mp4') || item.urlImage.endsWith('.mov')));
                    const ext = estVideo ? 'mp4' : 'jpg';

                    zip.file(`Fichier_${i + 1}.${ext}`, blob);
                } catch (err) { 
                    console.error("Erreur de compression d'un fichier :", err); 
                }
            }

            zip.generateAsync({ type: "blob" }).then((content) => {
                const urlZip = window.URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = urlZip;
                a.download = `Collection_${nomAlbum.replace(/\s+/g, '_')}_Archive.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                btn.innerText = "📥 Tout télécharger (.ZIP)";
                btn.disabled = false;
            });
        };
    }

    document.getElementById('closeLb').addEventListener('click', () => {
        lightbox.style.display = 'none';
        mediaContainer.innerHTML = '';
    });
    document.getElementById('nextLb').addEventListener('click', () => naviguer(1));
    document.getElementById('prevLb').addEventListener('click', () => naviguer(-1));

    document.addEventListener('keydown', (e) => {
        if (lightbox.style.display === 'flex') {
            if (e.key === 'ArrowRight') naviguer(1);
            if (e.key === 'ArrowLeft') naviguer(-1);
            if (e.key === 'Escape') {
                lightbox.style.display = 'none';
                mediaContainer.innerHTML = '';
            }
        }
    });
</script>
</body>
</html>
