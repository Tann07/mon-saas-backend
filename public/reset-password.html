<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — Mon SaaS Média</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-boho: #FAF6F0; --primary-terracotta: #C97A63; --text-dark: #2D2A26; --text-light: #766E65; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-boho); color: var(--text-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 24px; max-width: 420px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #E5DCD3; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary-terracotta); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .msg { margin-top: 14px; font-size: 13px; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Nouveau mot de passe</h1>
    <p style="font-size: 13px; color: var(--text-light); margin-bottom: 20px;">Choisissez votre nouveau mot de passe sécurisé.</p>
    <form id="resetForm">
        <input type="password" id="newPass" placeholder="Nouveau mot de passe" required minlength="6">
        <button type="submit" id="btnSubmit">Réinitialiser le mot de passe</button>
    </form>
    <div class="msg" id="msgBox"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPass').value;
        const msgBox = document.getElementById('msgBox');

        try {
            const res = await fetch('/api/users/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();
            msgBox.style.display = 'block';
            if (res.ok) {
                msgBox.style.background = 'rgba(141, 161, 145, 0.2)'; msgBox.style.color = '#437651';
                msgBox.innerHTML = `${data.message} <br><a href="/index.html" style="color:#2D2A26; font-weight:bold;">Se connecter ➔</a>`;
            } else {
                msgBox.style.background = 'rgba(201, 99, 99, 0.2)'; msgBox.style.color = '#C96363';
                msgBox.innerText = data.message;
            }
        } catch(err) { alert("Erreur serveur."); }
    });
</script>
</body>
</html>
