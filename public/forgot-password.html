<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — Mon SaaS Média</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-boho: #FAF6F0;
            --primary-terracotta: #C97A63;
            --primary-hover: #B26550;
            --text-dark: #2D2A26;
            --text-light: #766E65;
            --radius-lg: 24px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-boho);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            max-width: 420px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(74, 58, 49, 0.06);
            border: 1px solid rgba(240, 230, 220, 0.8);
            text-align: center;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
        p { color: var(--text-light); font-size: 13.5px; line-height: 1.5; margin-bottom: 24px; }

        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5DCD3;
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
            background: #FCFAF7;
        }
        input[type="email"]:focus { border-color: var(--primary-terracotta); background: white; }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary-terracotta);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: var(--primary-hover); }

        .msg-box { margin-top: 16px; font-size: 13px; font-weight: 500; display: none; padding: 10px; border-radius: var(--radius-sm); }
        .msg-box.success { background: rgba(141, 161, 145, 0.15); color: #437651; }
        .msg-box.error { background: rgba(201, 99, 99, 0.15); color: #C96363; }

        .back-link { display: inline-block; margin-top: 20px; color: var(--text-light); font-size: 13px; text-decoration: none; font-weight: 600; }
        .back-link:hover { color: var(--text-dark); }
    </style>
</head>
<body>

<div class="card">
    <h1>Mot de passe oublié ?</h1>
    <p>Saisissez votre adresse e-mail. Si un compte existe, nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

    <form id="forgotForm">
        <input type="email" id="emailInput" placeholder="votre.email@exemple.com" required>
        <button type="submit" class="btn-submit" id="btnSubmit">Envoyer le lien</button>
    </form>

    <div class="msg-box" id="msgBox"></div>

    <a href="/index.html" class="back-link">← Retour à la connexion</a>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('emailInput').value.trim();
        const btn = document.getElementById('btnSubmit');
        const msgBox = document.getElementById('msgBox');

        btn.disabled = true;
        btn.innerText = "⏳ Envoi en cours...";
        msgBox.style.display = 'none';

        try {
            // 1er essai sur /api/users/forgot-password
            let res = await fetch('/api/users/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            // 2e essai de secours sur /api/auth/forgot-password si 404
            if (res.status === 404) {
                res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
            }

            const data = await res.json();

            msgBox.style.display = 'block';
            if (res.ok) {
                msgBox.className = 'msg-box success';
                msgBox.innerText = data.message;
                document.getElementById('forgotForm').reset();
            } else {
                msgBox.className = 'msg-box error';
                msgBox.innerText = data.message || "Une erreur est survenue.";
            }
        } catch (err) {
            console.error(err);
            msgBox.style.display = 'block';
            msgBox.className = 'msg-box error';
            msgBox.innerText = "Erreur de connexion au serveur. Vérifiez les logs Node.js.";
        }

        btn.disabled = false;
        btn.innerText = "Envoyer le lien";
    });
</script>
</body>
</html>
